[badges.appveyor]
repository = "rust-random/rand"

[badges.travis-ci]
repository = "rust-random/rand"

[dependencies.rand_core]
version = "0.5"

[lib]
path = "src/lib.rs"

[package]
authors = ["The Rand Project Developers"]
categories = ["algorithms", "no-std"]
