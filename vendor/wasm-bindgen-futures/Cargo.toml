[dependencies.cfg-if]
version = "1.0.0"

[dependencies.futures-core]
default-features = false
optional = true
version = "0.3.8"

[dependencies.js-sys]
default-features = false
version = "=0.3.77"

[dependencies.once_cell]
default-features = false
version = "1.12"

[dependencies.wasm-bindgen]
default-features = false
version = "=0.2.100"

[features]
default = ["std"]
futures-core-03-stream = ["futures-core"]
std = ["wasm-bindgen/std", "js-sys/std", "web-sys/std"]

[lib]
path = "src/lib.rs"

[lints.clippy]
large_enum_variant = "allow"
new_without_default = "allow"
overly_complex_bool_expr = "allow"
too_many_arguments = "allow"
type_complexity = "allow"

[package]
authors = ["The wasm-bindgen Developers"]
autobenches = false
autobins = false
autoexamples = false
autolib = false
autotests = false
description = "Bridging the gap between Rust Futures and JavaScript Promises"
documentation = "https://docs.rs/wasm-bindgen-futures"
edition = "2021"
homepage = "https://rustwasm.github.io/wasm-bindgen/"
include = ["/LICENSE-*", "/src"]
license = "MIT OR Apache-2.0"
name = "wasm-bindgen-futures"
readme = "README.md"
repository = "https://github.com/rustwasm/wasm-bindgen/tree/master/crates/futures"
rust-version = "1.57"
version = "0.4.50"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[target.'cfg(target_arch = "wasm32")'.dev-dependencies.futures-channel]
version = "0.3"

[target.'cfg(target_arch = "wasm32")'.dev-dependencies.futures-lite]
default-features = false
version = "2"

[target.'cfg(target_feature = "atomics")'.dependencies.web-sys]
default-features = false
features = ["MessageEvent", "Worker"]
version = "=0.3.77"
